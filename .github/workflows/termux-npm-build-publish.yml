name: termux-npm-build-publish

on:
  push:
    branches:
      - main
      - lts
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref or branch to build"
        required: true
        type: string
        default: "develop"
      create_release:
        description: "Create or refresh draft GitHub release assets"
        required: true
        type: boolean
        default: false
      publish_npm:
        description: "Publish npm package"
        required: true
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag"
        required: true
        type: string
        default: "test"

jobs:
  build-android-arm64:
    name: Build Android ARM64
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      ANDROID_NDK_VERSION: "28.2.13676358"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref_name }}

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.93.0 --profile minimal --target aarch64-linux-android

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          : "${ANDROID_HOME:?ANDROID_HOME must be set on the GitHub runner}"
          export PATH="${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/cmdline-tools/bin:${PATH}"
          command -v sdkmanager
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"
          ndk_home="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ndk_home}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ndk_home}" >> "${GITHUB_ENV}"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          : "${ANDROID_NDK_HOME:?ANDROID_NDK_HOME must point to Android NDK r27c or newer}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          export LIBLZMA_NO_PKG_CONFIG=1
          export PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"
          eval "$(python3 scripts/fetch_rusty_v8_android.py | grep '^export ' | sed 's/^export //')"
          export RUSTY_V8_ARCHIVE RUSTY_V8_SRC_BINDING_PATH
          export CC_aarch64_linux_android="aarch64-linux-android29-clang"
          export CXX_aarch64_linux_android="aarch64-linux-android29-clang++"
          export AR_aarch64_linux_android="llvm-ar"
          export RANLIB_aarch64_linux_android="llvm-ranlib"
          export PKG_CONFIG_ALLOW_CROSS=1
          export OPENSSL_NO_PKG_CONFIG=1
          cd codex-rs
          rustup run 1.93.0 cargo build --target aarch64-linux-android --release -p codex-cli -p codex-exec

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cp codex-rs/target/aarch64-linux-android/release/codex npm-package/bin/codex.bin
          cp codex-rs/target/aarch64-linux-android/release/codex-exec npm-package/bin/codex-exec.bin
          cp "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" npm-package/bin/libc++_shared.so
          chmod +x npm-package/bin/codex npm-package/bin/codex-exec npm-package/bin/codex.bin npm-package/bin/codex-exec.bin npm-package/bin/libc++_shared.so
          bash verify-patches.sh
          cd npm-package
          rm -f ./*.tgz
          npm pack
          package_tgz="$(ls -1 *.tgz)"
          package_version="$(node -p "require('./package.json').version")"
          sha256sum "${package_tgz}" | tee "${package_tgz}.sha256"
          echo "PACKAGE_TGZ=npm-package/${package_tgz}" >> "${GITHUB_ENV}"
          echo "PACKAGE_SHA256_FILE=npm-package/${package_tgz}.sha256" >> "${GITHUB_ENV}"
          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=v${package_version}" >> "${GITHUB_ENV}"
          ls -lh "${package_tgz}" "${package_tgz}.sha256"

      - name: Upload npm tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-cli-termux-android-arm64-${{ env.PACKAGE_VERSION }}
          path: |
            ${{ env.PACKAGE_TGZ }}
            ${{ env.PACKAGE_SHA256_FILE }}
          if-no-files-found: error

      - name: Create Draft GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REPO: DioNanos/codex-termux
        run: |
          set -euo pipefail
          notes_file=".release/${RELEASE_TAG}.md"
          if [ ! -f "${notes_file}" ]; then
            echo "missing release notes file: ${notes_file}" >&2
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" --repo "${RELEASE_REPO}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${PACKAGE_TGZ}" "${PACKAGE_SHA256_FILE}" \
              --repo "${RELEASE_REPO}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" "${PACKAGE_TGZ}" "${PACKAGE_SHA256_FILE}" \
              --repo "${RELEASE_REPO}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --notes-file "${notes_file}" \
              --draft
          fi

      - name: Publish
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          npm publish "${PACKAGE_TGZ}" --tag "${{ github.event.inputs.npm_tag || 'test' }}"
