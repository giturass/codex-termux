name: termux-npm-build-publish

on:
  push:
    branches:
      - main
      - 'merge/**'
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref or branch to build"
        required: true
        type: string
        default: "main"
      publish_npm:
        description: "Publish npm package"
        required: true
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag"
        required: true
        type: string
        default: "test"

jobs:
  build-android-arm64:
    name: Build Android ARM64
    runs-on: android-heavy
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c "import json; print(json.load(open('npm-package/package.json'))['version'])")"
          ref_sha="$(git rev-parse HEAD)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ref_sha=${ref_sha}" >> "$GITHUB_OUTPUT"
          echo "Version: ${version}  SHA: ${ref_sha}"

      - name: Setup Android NDK and rusty_v8
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_NDK_HOME="/home/dag/android-ndk/android-ndk-r27c"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          export PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"
          eval "$(python3 scripts/fetch_rusty_v8_android.py | grep '^export ' | sed 's/^export //')"
          {
            echo "ANDROID_NDK_HOME=${ANDROID_NDK_HOME}"
            echo "ANDROID_NDK_ROOT=${ANDROID_NDK_ROOT}"
            echo "PATH=${PATH}"
            echo "RUSTY_V8_ARCHIVE=${RUSTY_V8_ARCHIVE}"
            echo "RUSTY_V8_SRC_BINDING_PATH=${RUSTY_V8_SRC_BINDING_PATH}"
            echo "CC_aarch64_linux_android=aarch64-linux-android29-clang"
            echo "CXX_aarch64_linux_android=aarch64-linux-android29-clang++"
            echo "AR_aarch64_linux_android=llvm-ar"
            echo "RANLIB_aarch64_linux_android=llvm-ranlib"
            echo "PKG_CONFIG_ALLOW_CROSS=1"
            echo "OPENSSL_NO_PKG_CONFIG=1"
          } >> "$GITHUB_ENV"

      - name: Cargo build (aarch64-linux-android)
        shell: bash
        run: |
          set -euo pipefail
          rustup run 1.93.0 cargo build --target aarch64-linux-android --release -p codex-cli -p codex-exec

      - name: Stage binaries and verify
        shell: bash
        run: |
          set -euo pipefail
          cp "codex-rs/target/aarch64-linux-android/release/codex" npm-package/bin/codex.bin
          cp "codex-rs/target/aarch64-linux-android/release/codex-exec" npm-package/bin/codex-exec.bin
          cp "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" npm-package/bin/libc++_shared.so
          chmod +x npm-package/bin/codex npm-package/bin/codex-exec npm-package/bin/codex.bin npm-package/bin/codex-exec.bin npm-package/bin/libc++_shared.so
          ls -lh npm-package/bin/codex.bin npm-package/bin/codex-exec.bin npm-package/bin/libc++_shared.so
          bash verify-patches.sh

      - name: npm pack
        id: npm_pack
        shell: bash
        run: |
          set -euo pipefail
          cd npm-package
          tarball="$(npm pack)"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          ls -lh "${tarball}"

      - uses: actions/upload-artifact@v4
        with:
          name: npm-termux-tarball
          path: npm-package/*.tgz

      - name: npm publish
        if: ${{ github.event.inputs.publish_npm == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd npm-package
          npm publish "${{ steps.npm_pack.outputs.tarball }}" --tag "${{ github.event.inputs.npm_tag || 'test' }}"
